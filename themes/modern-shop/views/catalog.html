<!-- Catalog View -->
<div class="catalog-toolbar">
  <div class="catalog-search">
    <span class="material-icons">search</span>
    <input type="text" id="catalog-search-input" placeholder="Search APIs...">
  </div>
  <div class="catalog-tags" id="catalog-tags">
    <!-- Tags rendered by JS -->
  </div>
  <div class="catalog-view-toggle">
    <button class="view-toggle-btn active" id="grid-view-btn" title="Grid view">
      <span class="material-icons">grid_view</span>
    </button>
    <button class="view-toggle-btn" id="list-view-btn" title="List view">
      <span class="material-icons">view_list</span>
    </button>
  </div>
</div>

<div id="catalog-products-container">
  <!-- Products rendered by JS -->
</div>
