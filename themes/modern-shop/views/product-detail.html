<!-- Product Detail View -->
<div class="detail-back">
  <button class="btn btn-text" id="detail-back-btn">
    <span class="material-icons">arrow_back</span>
    Back to catalog
  </button>
</div>

<div class="detail-header">
  <div class="detail-icon product-icon" id="detail-icon">
    <span class="material-icons">api</span>
  </div>
  <div class="detail-info">
    <h1 id="detail-name">Product Name</h1>
    <div class="detail-meta">
      <span class="detail-style-badge" id="detail-style-badge">REST</span>
      <span class="detail-category-badge" id="detail-category-badge">
        <span class="material-icons" style="font-size:16px">folder</span>
        Category
      </span>
    </div>
  </div>
</div>

<div class="detail-tags" id="detail-tags">
  <!-- Tags rendered by JS -->
</div>

<div class="detail-tabs" id="detail-tabs">
  <!-- Tabs rendered by JS -->
</div>

<div class="detail-tab-content" id="detail-tab-content">
  <!-- Tab content rendered by JS -->
</div>
