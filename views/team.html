<div class="action-bar" style="margin-bottom: 1rem; display: flex; justify-content: flex-end;">
    <button id="btn-add-member" class="btn-primary">
        <span class="material-icons-round">add</span> Add Member
    </button>
</div>

<!-- Add Member Form (Hidden by default) -->
<div id="add-member-form" class="card" style="display: none; margin-bottom: 1rem;">
    <h3>Add New Team Member</h3>
    <form id="form-add-member">
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="member-name" required class="input-field" placeholder="e.g. Jane Doe">
        </div>
        <div class="form-group">
            <label>Role</label>
            <input type="text" id="member-role" required class="input-field" placeholder="e.g. Software Engineer">
        </div>
        <div class="form-group">
             <label>Email</label>
             <input type="email" id="member-email" required class="input-field" placeholder="e.g. jane@example.com">
        </div>
        <div class="form-actions">
            <button type="button" id="btn-cancel-add" class="btn-secondary">Cancel</button>
            <button type="submit" class="btn-primary">Save</button>
        </div>
    </form>
</div>

<div id="team-members" class="card-grid">
    <!-- Members will be rendered here -->
</div>

<script>
(function() {
    // Team Management Logic
    const teamContainer = document.getElementById('team-members');
    const addMemberBtn = document.getElementById('btn-add-member');
    const addMemberForm = document.getElementById('add-member-form');
    const form = document.getElementById('form-add-member');
    const cancelBtn = document.getElementById('btn-cancel-add');

    // Default Data
    const defaultMembers = [
        { name: "Sarah Smith", role: "Product Manager", email: "sarah@example.com" },
        { name: "Mike Johnson", role: "Lead Developer", email: "mike@example.com" },
        { name: "Emily Davis", role: "UX Designer", email: "emily@example.com" }
    ];

    function loadMembers() {
        const stored = localStorage.getItem('team_members');
        if (!stored) {
            localStorage.setItem('team_members', JSON.stringify(defaultMembers));
            return defaultMembers;
        }
        return JSON.parse(stored);
    }

    function saveMembers(members) {
        localStorage.setItem('team_members', JSON.stringify(members));
    }

    function renderMembers() {
        const members = loadMembers();
        teamContainer.innerHTML = members.map((member, index) => `
            <div class="card" style="text-align: center; position: relative;">
                <button class="icon-btn btn-delete" data-index="${index}" style="position: absolute; top: 1rem; right: 1rem; color: #ef4444;" aria-label="Remove Member">
                    <span class="material-icons-round">delete</span>
                </button>
                <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(member.name)}&background=random" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 1rem;">
                <h3>${member.name}</h3>
                <p>${member.role}</p>
                <div style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center;">
                    <button class="icon-btn" title="${member.email}"><span class="material-icons-round">email</span></button>
                    <button class="icon-btn"><span class="material-icons-round">call</span></button>
                </div>
            </div>
        `).join('');

        // Re-attach listeners for delete buttons
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = e.currentTarget.dataset.index;
                // Confirm deletion
                if(confirm('Are you sure you want to remove this member?')) {
                    removeMember(index);
                }
            });
        });
    }

    function addMember(member) {
        const members = loadMembers();
        members.push(member);
        saveMembers(members);
        renderMembers();
        toggleForm(false);
        form.reset();
    }

    function removeMember(index) {
        const members = loadMembers();
        members.splice(index, 1);
        saveMembers(members);
        renderMembers();
    }

    function toggleForm(show) {
        addMemberForm.style.display = show ? 'block' : 'none';
        addMemberBtn.style.display = show ? 'none' : 'inline-flex';
    }

    // Event Listeners
    if (addMemberBtn) {
        addMemberBtn.addEventListener('click', () => toggleForm(true));
    }

    if (cancelBtn) {
        cancelBtn.addEventListener('click', () => toggleForm(false));
    }

    if (form) {
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('member-name').value;
            const role = document.getElementById('member-role').value;
            const email = document.getElementById('member-email').value;
            addMember({ name, role, email });
        });
    }

    // Initial Render
    if (teamContainer) {
        renderMembers();
    }

})();
</script>
