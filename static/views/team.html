<div id="team-view-container">
    <!-- List View -->
    <div id="team-list-view">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
            <div style="display: flex; gap: 1rem; align-items: center; flex: 1;">
                 <h3 style="white-space: nowrap;">Team Members</h3>
                 <input type="text" id="member-search" class="search-input" placeholder="Search members...">
            </div>

            <button id="btn-add-member" style="background: var(--accent-color); color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; white-space: nowrap;">
                <span class="material-icons-round" style="font-size: 1.2rem;">add</span> Add Member
            </button>
        </div>

        <div id="team-members" class="card-grid">
            <!-- Members will be rendered here -->
        </div>

        <div id="empty-state" style="text-align: center; padding: 3rem; color: var(--text-secondary); display: none;">
            <span class="material-icons-round" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;">group_off</span>
            <p>No team members found.</p>
        </div>
    </div>

    <!-- Add Member Editor View (Hidden by default) -->
    <div id="team-editor-view" style="display: none; min-height: 100%; padding-bottom: 2rem;">
        <div class="card" style="max-width: 600px; margin: 0 auto; position: relative;">
            <button id="btn-close-editor" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; cursor: pointer; color: var(--text-secondary);">
                <span class="material-icons-round">close</span>
            </button>
            <h3 style="margin-bottom: 1.5rem;">Add New Team Member</h3>

            <form id="form-add-member">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem;">Name</label>
                    <input type="text" id="member-name" required class="input-field" placeholder="e.g. Jane Doe" style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-primary);">
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem;">Role</label>
                    <input type="text" id="member-role" required class="input-field" placeholder="e.g. Software Engineer" style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-primary);">
                </div>
                <div class="form-group">
                     <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem;">Email</label>
                     <input type="email" id="member-email" required class="input-field" placeholder="e.g. jane@example.com" style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-primary);">
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                    <button type="button" id="btn-cancel-add" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.5rem 1.5rem; border-radius: 0.5rem; cursor: pointer;">Cancel</button>
                    <button type="submit" style="background: var(--accent-color); color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer;">Save Member</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
(function() {
    // --- State ---
    const defaultMembers = [
        { name: "Sarah Smith", role: "Product Manager", email: "sarah@example.com" },
        { name: "Mike Johnson", role: "Lead Developer", email: "mike@example.com" },
        { name: "Emily Davis", role: "UX Designer", email: "emily@example.com" }
    ];

    let members = JSON.parse(localStorage.getItem('team_members'));
    if (!members) {
        members = defaultMembers;
        localStorage.setItem('team_members', JSON.stringify(members));
    }

    let filterText = "";

    // --- Elements ---
    const listView = document.getElementById('team-list-view');
    const editorView = document.getElementById('team-editor-view');
    const teamContainer = document.getElementById('team-members');
    const emptyState = document.getElementById('empty-state');
    const searchInput = document.getElementById('member-search');

    const btnAdd = document.getElementById('btn-add-member');
    const btnClose = document.getElementById('btn-close-editor');
    const btnCancel = document.getElementById('btn-cancel-add');
    const form = document.getElementById('form-add-member');

    // --- Logic ---
    function saveMembers() {
        localStorage.setItem('team_members', JSON.stringify(members));
    }

    function renderMembers() {
        teamContainer.innerHTML = '';

        const filtered = members.filter(m =>
            m.name.toLowerCase().includes(filterText.toLowerCase()) ||
            m.role.toLowerCase().includes(filterText.toLowerCase())
        );

        if (filtered.length === 0) {
            teamContainer.style.display = 'none';
            emptyState.style.display = 'block';
            if (filterText) {
                emptyState.querySelector('p').textContent = `No members found matching "${filterText}"`;
            } else {
                emptyState.querySelector('p').textContent = "No team members found.";
            }
        } else {
            teamContainer.style.display = 'grid'; // Restore grid layout
            emptyState.style.display = 'none';

            filtered.forEach((member, index) => {
                // Find actual index in main array for deletion
                const realIndex = members.indexOf(member);

                const card = document.createElement('div');
                card.className = 'card';
                card.style.textAlign = 'center';
                card.style.position = 'relative';

                card.innerHTML = `
                    <button class="icon-btn btn-delete" style="position: absolute; top: 1rem; right: 1rem; color: #ef4444;" aria-label="Remove Member">
                        <span class="material-icons-round">delete</span>
                    </button>
                    <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(member.name)}&background=random" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 1rem;">
                    <h3>${member.name}</h3>
                    <p>${member.role}</p>
                    <div style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center;">
                        <button class="icon-btn" title="${member.email}"><span class="material-icons-round">email</span></button>
                        <button class="icon-btn"><span class="material-icons-round">call</span></button>
                    </div>
                `;

                card.querySelector('.btn-delete').addEventListener('click', () => {
                     if(confirm(`Are you sure you want to remove ${member.name}?`)) {
                        removeMember(realIndex);
                    }
                });

                teamContainer.appendChild(card);
            });
        }
    }

    function addMember(member) {
        members.push(member);
        saveMembers();
        renderMembers();
        closeEditor();
        form.reset();
    }

    function removeMember(index) {
        members.splice(index, 1);
        saveMembers();
        renderMembers();
    }

    function openEditor() {
        listView.style.display = 'none';
        editorView.style.display = 'block';
    }

    function closeEditor() {
        editorView.style.display = 'none';
        listView.style.display = 'block';
    }

    // --- Event Listeners ---
    btnAdd.addEventListener('click', openEditor);
    btnClose.addEventListener('click', closeEditor);
    btnCancel.addEventListener('click', closeEditor);

    searchInput.addEventListener('input', (e) => {
        filterText = e.target.value;
        renderMembers();
    });

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('member-name').value;
        const role = document.getElementById('member-role').value;
        const email = document.getElementById('member-email').value;
        addMember({ name, role, email });
    });

    // Initial Render
    renderMembers();

})();
</script>
